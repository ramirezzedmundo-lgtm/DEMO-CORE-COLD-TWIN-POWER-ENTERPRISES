version: '3.8'

services:
  # El Corazón: Cold-Gateway en Go
  gateway:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      - REDIS_ADDR=redis:6379
    networks:
      - twin-power-net
    restart: always

  # El Motor: Redis para el ROI y Tokens
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - twin-power-net
    volumes:
      - redis_data:/data

  # La Metralleta: Simulador de IA en Python
  simulator:
    build: 
      context: .
      dockerfile: Dockerfile.simulator
    depends_on:
      - gateway
    networks:
      - twin-power-net
    restart: unless-stopped

networks:
  twin-power-net:
    driver: bridge

volumes:
  redis_data:
